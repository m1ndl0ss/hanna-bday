<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Химия чувств — Ханна</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,200;0,300;0,400;0,500;0,600;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #B3E5FC;
  --surface: rgba(255,255,255,0.6);
  --surface-hover: rgba(255,255,255,0.82);
  --text: #0d2137;
  --text-dim: rgba(13,33,55,0.6);
  --text-faint: rgba(13,33,55,0.38);
  --border: rgba(13,33,55,0.1);
  --accent: #0d2137;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
}

/* ── HEADER ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  padding: 20px 32px;
  display: flex; align-items: center; justify-content: space-between;
  background: transparent;
  pointer-events: none;
}
#header-title {
  font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text-faint); font-weight: 400;
}
#music-btn {
  pointer-events: all; cursor: pointer;
  width: 280px; height: 280px; border-radius: 50%;
  background: transparent; border: none;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.2s;
}
#music-btn:hover { opacity: 0.85; }
#vinyl {
  width: 280px; height: 280px; border-radius: 50%;
  overflow: hidden;
  transform: rotate(-13deg);
  transition: transform 0.4s ease;
}
#vinyl img {
  width: 100%; height: 100%; border-radius: 50%;
  display: block;
  object-fit: cover;
}
#music-btn.playing #vinyl {
  transform: none;
  animation: vinyl-spin 3s linear infinite;
}
@keyframes vinyl-spin { to { transform: rotate(360deg); } }

/* ── MENU ── */
#menu { display: block; }
#menu-heading {
  position: fixed; top: 28px; left: 0; right: 0; z-index: 5;
  text-align: center; pointer-events: none;
}
#menu-heading h1 {
  font-size: clamp(18px, 2.5vw, 30px); font-weight: 200;
  letter-spacing: 0.05em; margin-bottom: 8px;
  background: linear-gradient(135deg, #0d2137 30%, #1a6b99);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
#menu-heading p {
  font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
  color: #F5C842; font-weight: 500; opacity: 0.9;
  margin-top: 4px;
}

/* ── ORBIT STAGE ── */
#orbit-wrap {
  width: 100vw; height: 100vh;
  position: relative; overflow: hidden;
}
#orbit-stage {
  position: absolute; left: 50%; top: 50%;
  width: 0; height: 0; overflow: visible;
}

/* ── CARDS (absolute positioned, managed entirely by JS) ── */
.mol-card {
  position: absolute;
  transform: translate(-50%, -50%);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  border: 1px solid rgba(255,255,255,0.12);
  transition: background 0.25s ease, box-shadow 0.35s ease, transform 0.2s ease;
}
.mol-card:not(.is-center) {
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.mol-card:not(.is-center):hover {
  background: rgba(255,255,255,0.85);
  transform: translate(-50%, -50%) scale(1.06);
}
.mol-card.is-center {
  background: rgba(255,252,240,0.82);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1.5px solid rgba(245,200,66,0.45);
  box-shadow:
    0 0 0 3px rgba(245,200,66,0.18),
    0 0 48px rgba(245,200,66,0.28),
    0 12px 40px rgba(0,0,0,0.10);
  animation: center-pulse 3.5s ease-in-out infinite;
}
@keyframes center-pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1);     box-shadow: 0 0 0 3px rgba(245,200,66,0.18), 0 0 48px rgba(245,200,66,0.28), 0 12px 40px rgba(0,0,0,0.10); }
  50%       { transform: translate(-50%, -50%) scale(1.025); box-shadow: 0 0 0 4px rgba(245,200,66,0.28), 0 0 64px rgba(245,200,66,0.38), 0 16px 48px rgba(0,0,0,0.12); }
}

/* Both content layers stack on top of each other */
.card-small,
.card-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 14px 10px 12px; gap: 8px;
  transition: opacity 0.25s ease;
}
.card-center { padding: 26px 24px 20px; gap: 10px; }

/* Visibility toggling via opacity */
.mol-card:not(.is-center) .card-center {
  opacity: 0; pointer-events: none;
}
.mol-card.is-center .card-small {
  opacity: 0; pointer-events: none;
}
.mol-card.is-center .card-center {
  opacity: 1; pointer-events: all;
  transition: opacity 0.3s ease 0.28s;
}
.mol-card:not(.is-center) .card-small {
  opacity: 1; pointer-events: all;
}

/* SVG wrappers */
.c-svg { width: 100%; display: flex; align-items: center; justify-content: center; }
.card-small .c-svg { height: 84px; }
.card-small .c-svg svg { width: 100%; height: 84px; opacity: 0.65; transition: opacity 0.2s; }
.mol-card:hover .card-small .c-svg svg { opacity: 1; }

.card-center .c-svg { height: 200px; }
.card-center .c-svg svg { max-width: 100%; max-height: 200px; opacity: 0.8; transition: opacity 0.2s; }
.mol-card.is-center:hover .card-center .c-svg svg { opacity: 1; }

/* Card text */
.card-small .c-name {
  font-size: 13px; font-weight: 500; color: var(--text);
  text-align: center; letter-spacing: 0.01em; line-height: 1.3;
}
.card-small .c-formula {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--text-faint);
  text-align: center; letter-spacing: 0.03em;
}
.card-center .c-name {
  font-size: 30px; font-weight: 400; color: var(--text);
  letter-spacing: 0.03em; text-align: center;
}
.card-center .c-formula {
  font-family: 'Space Mono', monospace;
  font-size: 13px; color: var(--text-dim);
  text-align: center; letter-spacing: 0.05em;
}
.card-center .c-emotion {
  font-size: 12px; font-weight: 200; font-style: italic;
  color: var(--text-dim); text-align: center;
}
.card-center .c-open {
  margin-top: 10px; font-size: 11px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-faint);
  transition: color 0.2s;
}
.mol-card.is-center:hover .card-center .c-open { color: var(--text-dim); }

/* ── BIRTHDAY CARD (fixed bottom) ── */
#bday-card {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 5;
  width: 200px; height: 80px;
  background: var(--surface);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  gap: 12px; cursor: pointer;
  transition: background 0.25s;
  -webkit-tap-highlight-color: transparent;
}
#bday-card:hover { background: var(--surface-hover); }
#bday-card .bday-icon {
  font-size: 20px; animation: hb-float 2.5s ease-in-out infinite;
}
#bday-card .bday-label {
  font-size: 12px; font-weight: 300; color: rgba(220,180,100,0.75);
  letter-spacing: 0.03em; line-height: 1.4;
}
@keyframes hb-float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}

/* ── SLIDE ── */
.slide {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg); overflow-y: auto;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.2,0,0,1);
  transform: scale(0.96) translateY(12px);
}
.slide.active {
  opacity: 1; pointer-events: all;
  transform: scale(1) translateY(0);
}
.slide-inner {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 70px 24px 60px; max-width: 760px; margin: 0 auto;
}
.slide-back {
  position: fixed; top: 20px; left: 24px; z-index: 200;
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-dim); cursor: pointer;
  background: rgba(255,255,255,0.7); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 16px;
  transition: color 0.2s, background 0.2s, border-color 0.2s;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.slide-back:hover { color: var(--text); background: rgba(255,255,255,0.9); border-color: rgba(13,33,55,0.25); }
.slide-back svg { width: 12px; height: 12px; }

.slide-molecule-label {
  font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text-faint); margin-bottom: 6px; font-family: 'Space Mono', monospace;
}
.slide-name {
  font-size: clamp(28px, 6vw, 52px); font-weight: 300; letter-spacing: 0.03em;
  text-align: center; margin-bottom: 8px;
  background: linear-gradient(135deg, #0d2137 30%, #1a6b99);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.slide-science {
  font-size: 12px; letter-spacing: 0.06em; color: var(--text-faint);
  font-style: italic; text-align: center; margin-bottom: 40px;
}
.slide-svg-wrap {
  width: 100%; max-width: 420px; margin: 0 auto 48px;
  display: flex; align-items: center; justify-content: center;
}
.slide-svg-wrap svg { width: 100%; }

.draw-line {
  stroke-dasharray: 300; stroke-dashoffset: 300;
  animation: draw-in 1.8s ease forwards;
}
.draw-line:nth-child(2)  { animation-delay: 0.10s; }
.draw-line:nth-child(3)  { animation-delay: 0.20s; }
.draw-line:nth-child(4)  { animation-delay: 0.30s; }
.draw-line:nth-child(5)  { animation-delay: 0.40s; }
.draw-line:nth-child(6)  { animation-delay: 0.50s; }
.draw-line:nth-child(7)  { animation-delay: 0.60s; }
.draw-line:nth-child(8)  { animation-delay: 0.70s; }
.draw-line:nth-child(9)  { animation-delay: 0.80s; }
.draw-line:nth-child(10) { animation-delay: 0.90s; }
.draw-line:nth-child(11) { animation-delay: 1.00s; }
.draw-line:nth-child(12) { animation-delay: 1.10s; }
.draw-line:nth-child(13) { animation-delay: 1.20s; }
.draw-line:nth-child(14) { animation-delay: 1.30s; }
.draw-line:nth-child(15) { animation-delay: 1.40s; }
.draw-line:nth-child(16) { animation-delay: 1.50s; }
.draw-line:nth-child(17) { animation-delay: 1.60s; }
.draw-line:nth-child(18) { animation-delay: 1.70s; }
.draw-label { opacity: 0; animation: fade-in-label 0.5s ease forwards; }
.draw-label:nth-child(1) { animation-delay: 0.3s; }
.draw-label:nth-child(2) { animation-delay: 0.5s; }
.draw-label:nth-child(3) { animation-delay: 0.7s; }
.draw-label:nth-child(4) { animation-delay: 0.9s; }
.draw-label:nth-child(5) { animation-delay: 1.1s; }
.draw-label:nth-child(6) { animation-delay: 1.3s; }
.draw-label:nth-child(7) { animation-delay: 1.5s; }
.draw-label:nth-child(8) { animation-delay: 1.7s; }
@keyframes draw-in        { to { stroke-dashoffset: 0; } }
@keyframes fade-in-label  { to { opacity: 1; } }

.slide-moment {
  font-size: clamp(16px, 3vw, 24px); font-weight: 300;
  text-align: center; line-height: 1.6; color: var(--text);
  margin-bottom: 40px; padding: 0 16px; max-width: 500px;
}
.slide-moment::before { content: '«'; color: var(--text-dim); }
.slide-moment::after  { content: '»'; color: var(--text-dim); }

.slide-illustration {
  width: 100%; max-width: 380px; aspect-ratio: 4/3;
  border: 1px dashed rgba(13,33,55,0.15); border-radius: 12px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  color: var(--text-faint); font-size: 11px;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: rgba(255,255,255,0.25);
}
.slide-illustration svg { width: 28px; height: 28px; opacity: 0.3; }

/* ── BIRTHDAY SLIDE ── */
#birthday-slide .slide-inner { justify-content: center; text-align: center; min-height: 100vh; }
.bday-big-icon { font-size: 48px; margin-bottom: 32px; animation: hb-float 2.5s ease-in-out infinite; }
.bday-title {
  font-size: clamp(24px, 5vw, 44px); font-weight: 200; letter-spacing: 0.05em;
  color: rgba(220,180,100,0.95); margin-bottom: 16px;
  animation: fade-up 0.8s ease forwards;
}
.bday-subtitle {
  font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text-faint); margin-bottom: 56px;
  animation: fade-up 0.8s 0.2s ease both;
}
.bday-message {
  max-width: 500px; font-size: clamp(15px, 2.5vw, 19px);
  font-weight: 300; line-height: 1.8; color: var(--text-dim);
  animation: fade-up 0.8s 0.4s ease both; font-style: italic;
}
@keyframes fade-up {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── SLIDE ENTRANCE ── */
.slide-inner > * { animation: fade-up 0.6s ease both; }
.slide-inner > *:nth-child(1) { animation-delay: 0.05s; }
.slide-inner > *:nth-child(2) { animation-delay: 0.12s; }
.slide-inner > *:nth-child(3) { animation-delay: 0.18s; }
.slide-inner > *:nth-child(4) { animation-delay: 0.24s; }
.slide-inner > *:nth-child(5) { animation-delay: 0.30s; }
.slide-inner > *:nth-child(6) { animation-delay: 0.36s; }
.slide-inner > *:nth-child(7) { animation-delay: 0.42s; }

/* ── PARTICLES ── */
.particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.particle {
  position: absolute;
  font-size: 14px; line-height: 1;
  animation: particle-rise linear infinite;
  user-select: none;
}
@keyframes particle-rise {
  from { transform: translateY(100vh) rotate(0deg) scale(1); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 0.7; }
  to   { transform: translateY(-40px) rotate(20deg) scale(0.3); opacity: 0; }
}

/* ── INTRO ── */
#intro {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  pointer-events: all; transition: opacity 1.2s ease;
  cursor: pointer;
}
#intro.hide { opacity: 0; }
#intro.gone { display: none; }
.intro-ring {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(245,200,66,0.2);
  animation: ring-expand 4s ease-out forwards;
}
@keyframes ring-expand {
  from { transform: scale(0.3); opacity: 0.8; }
  to   { transform: scale(1.8); opacity: 0; }
}
#intro-text {
  font-size: clamp(28px, 5vw, 48px); font-weight: 400;
  text-align: center; letter-spacing: 0.04em;
  background: linear-gradient(135deg, #0d2137 20%, #1a6b99 55%, #F5C842 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  opacity: 0; animation: fade-up 0.9s ease 0.5s both; z-index: 2;
  padding: 14px 28px; border-radius: 16px;
}
#intro-skip {
  position: absolute; bottom: 32px; right: 32px;
  font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
  color: rgba(13,33,55,0.3); cursor: pointer; pointer-events: all;
  opacity: 0; transition: opacity 0.6s ease 2s, color 0.2s;
}
#intro.ready #intro-skip { opacity: 1; }
#intro-skip:hover { color: var(--text-dim); }
#intro-heart {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="intro">
  <div class="intro-ring" style="width:300px;height:300px;animation-delay:0s"></div>
  <div class="intro-ring" style="width:500px;height:500px;animation-delay:0.5s"></div>
  <div class="intro-ring" style="width:750px;height:750px;animation-delay:1s"></div>
  <svg id="intro-heart" preserveAspectRatio="xMidYMid meet"></svg>
  <div id="intro-text">For my lil chemist ♡</div>
  <div id="intro-skip" onclick="dismissIntro()">нажми чтобы войти</div>
</div>

<audio id="bg-music" loop autoplay>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="particles" id="particles"></div>

<div id="header">
  <span id="header-title">Химия чувств</span>
  <div id="music-btn" onclick="toggleMusic()">
    <div id="vinyl">
      <img src="disk.png" alt="RIP 2 MY YOUTH – The Neighbourhood">
    </div>
  </div>
</div>

<div id="menu">
  <div id="menu-heading">
    <h1>Двенадцать молекул</h1>
    <p>· формулы тебя ·</p>
  </div>
  <div id="orbit-wrap">
    <div id="orbit-stage"></div>
  </div>
  <div id="bday-card" onclick="openBirthday()">
    <div class="bday-icon">✦</div>
    <div class="bday-label">С днём рождения,<br>Ханна</div>
  </div>
</div>

<!-- Molecule slide -->
<div class="slide" id="mol-slide">
  <div class="slide-back" onclick="closeSlide()">
    <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M8 1 L2 6 L8 11"/>
    </svg>
    назад
  </div>
  <div class="slide-inner" id="slide-content"></div>
</div>

<!-- Birthday slide -->
<div class="slide" id="birthday-slide">
  <div class="slide-back" onclick="closeSlide()">
    <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M8 1 L2 6 L8 11"/>
    </svg>
    назад
  </div>
  <div class="slide-inner">
    <div class="bday-big-icon">✦</div>
    <div class="bday-title">С днём рождения, Ханна</div>
    <div class="bday-subtitle">с любовью и химией</div>
    <div class="bday-message">[birthday message here]</div>
  </div>
</div>

<script>
// ─── MOLECULE DATA ────────────────────────────────────────────────────────────
const molecules = [
  { id:'dopamine',      name:'Дофамин',       formula:'C₈H₁₁NO₂',        science:'нейромедиатор системы вознаграждения',       emotion:'предвкушение, награда',          moment:'мы кормили лебедей на земунском кее',                                    color:'#a78bfa', glow:'rgba(167,139,250,0.35)' },
  { id:'serotonin',     name:'Серотонин',      formula:'C₁₀H₁₂N₂O',       science:'регулятор настроения и благополучия',         emotion:'спокойствие, уют',               moment:'засыпаешь за три минуты, пока глажу тебе спину',                         color:'#34d399', glow:'rgba(52,211,153,0.35)' },
  { id:'oxytocin',      name:'Окситоцин',      formula:'C₄₃H₆₆N₁₂O₁₂S₂',  science:'нейропептид привязанности и доверия',         emotion:'привязанность, доверие',         moment:'Тайсон, который не отходит от тебя ни на шаг',                           color:'#f472b6', glow:'rgba(244,114,182,0.35)' },
  { id:'melatonin',     name:'Мелатонин',      formula:'C₁₃H₁₆N₂O₂',      science:'регулятор циркадных ритмов и сна',            emotion:'сон, безопасность',              moment:'засыпаешь у меня на руках в такси',                                      color:'#818cf8', glow:'rgba(129,140,248,0.35)' },
  { id:'pea',           name:'Фенилэтиламин',  formula:'C₈H₁₁N',           science:'нейромедиатор первичного влечения',           emotion:'влюблённость, первое притяжение', moment:'первый поцелуй на лестнице у Савы',                                      color:'#fb923c', glow:'rgba(251,146,60,0.35)' },
  { id:'adrenaline',    name:'Адреналин',       formula:'C₉H₁₃NO₃',        science:'гормон острой стрессовой реакции',            emotion:'возбуждение, острый момент',      moment:'лифт, который сломал мне руку во время поцелуев',                        color:'#f87171', glow:'rgba(248,113,113,0.35)' },

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const N_ORBIT  = 11;
const CENTER_W = 320;
const CENTER_H = 288;
const SMALL_W  = 144;
const SMALL_H  = 168;
const ARC_SAMPLES = 1000;
const HEART_SCALE = 20; // fallback; auto-scaled in initOrbit

// ─── HEART PATH ───────────────────────────────────────────────────────────────
// Parametric heart: x = 16·sin(t)³, y = −(13·cos(t) − 5·cos(2t) − 2·cos(3t) − cos(4t))
function heartXY(t, scale) {
  const hx =  scale * 16 * Math.pow(Math.sin(t), 3);
  const hy = -scale * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
  return { hx, hy };
}

// ─── ARC-LENGTH PARAMETERIZATION ─────────────────────────────────────────────
function buildArcTable(scale) {
  const pts = [];
  for (let i = 0; i <= ARC_SAMPLES; i++) {
    const t = (i / ARC_SAMPLES) * 2 * Math.PI;
    const { hx, hy } = heartXY(t, scale);
    pts.push({ x: hx, y: hy, t });
  }
  const cumLen = [0];
  for (let i = 1; i <= ARC_SAMPLES; i++) {
    const dx = pts[i].x - pts[i-1].x;
    const dy = pts[i].y - pts[i-1].y;
    cumLen.push(cumLen[i-1] + Math.sqrt(dx*dx + dy*dy));
  }
  const totalLen = cumLen[ARC_SAMPLES];
  return { pts, cumLen, totalLen };
}

// Return {x, y} at arc-fraction frac ∈ [0,1) via binary search
function posAtFraction(frac, tbl) {
  const target = ((frac % 1) + 1) % 1 * tbl.totalLen;
  let lo = 0, hi = ARC_SAMPLES;
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    if (tbl.cumLen[mid] <= target) lo = mid; else hi = mid;
  }
  const span = tbl.cumLen[hi] - tbl.cumLen[lo];
  const alpha = span < 1e-9 ? 0 : (target - tbl.cumLen[lo]) / span;
  return {
    x: tbl.pts[lo].x + alpha * (tbl.pts[hi].x - tbl.pts[lo].x),
    y: tbl.pts[lo].y + alpha * (tbl.pts[hi].y - tbl.pts[lo].y),
  };
}

// Minimum arc-distance between any two consecutive orbit slots
function minSpacingForTable(tbl) {
  let min = Infinity;
  for (let i = 0; i < N_ORBIT; i++) {
    const f1 = (i / N_ORBIT) % 1;
    const f2 = ((i + 1) / N_ORBIT) % 1;
    const p1 = posAtFraction(f1, tbl);
    const p2 = posAtFraction(f2, tbl);
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    min = Math.min(min, Math.sqrt(dx*dx + dy*dy));
  }
  return min;
}

function initOrbit() {
  // Auto-scale: grow heart until orbit slots are ≥ 120 px apart (or cap at scale 26)
  let scale = 18;
  while (scale <= 26) {
    arcTable = buildArcTable(scale);
    if (minSpacingForTable(arcTable) >= 140) break;
    scale += 2;
  }
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let orbitCards    = [];   // 11 mol IDs in slot order
let centerCard    = 'dopamine';
let phaseFraction = 0;    // 0→1 over 40 s, one full lap
let swapping      = false;
let lastTs        = null;
const cardEls     = {};
let arcTable      = null;

// ─── ORBIT MATH ──────────────────────────────────────────────────────────────
// Positions are relative to orbit center (0,0); cards use translate(-50%,-50%)
function getOrbitPos(slotIdx) {
  const frac = (phaseFraction + slotIdx / N_ORBIT) % 1;
  const rel  = posAtFraction(frac, arcTable);
  return { left: rel.x, top: rel.y };
}

function updateOrbitPositions() {
  orbitCards.forEach((id, i) => {
    const el = cardEls[id];
    if (!el) return;
    const p = getOrbitPos(i);
    el.style.left = p.left.toFixed(2) + 'px';
    el.style.top  = p.top.toFixed(2)  + 'px';
  });
}

// ─── ANIMATION LOOP ───────────────────────────────────────────────────────────
function orbitStep(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05); // cap dt on tab-switch
  lastTs = ts;
  if (!swapping) {
    phaseFraction = (phaseFraction + dt / 40) % 1;
    updateOrbitPositions();
  }
  requestAnimationFrame(orbitStep);
}

// ─── SWAP ─────────────────────────────────────────────────────────────────────
const SWAP_TRANS = [
  'left   0.56s cubic-bezier(0.4,0,0.2,1)',
  'top    0.56s cubic-bezier(0.4,0,0.2,1)',
  'width  0.56s cubic-bezier(0.4,0,0.2,1)',
  'height 0.56s cubic-bezier(0.4,0,0.2,1)',
].join(', ');

function setGlow(el, molId, remove = false) {
  const mol = molecules.find(m => m.id === molId);
  if (!mol) return;
  el.style.boxShadow = remove ? '' : `0 0 40px 6px ${mol.glow}, 0 8px 32px rgba(0,0,0,0.12)`;
}

function swapToCenter(molId) {
  if (swapping) return;
  const slotIdx = orbitCards.indexOf(molId);
  if (slotIdx === -1) return;
  swapping = true;

  const inEl  = cardEls[molId];       // incoming (orbital → center)
  const outEl = cardEls[centerCard];  // outgoing (center → orbital)

  // Capture current pixel position of the orbital card (set by last rAF tick)
  const capL = parseFloat(inEl.style.left);
  const capT = parseFloat(inEl.style.top);

  // Enable transitions on both
  inEl.style.transition  = SWAP_TRANS + ', background 0.25s';
  outEl.style.transition = SWAP_TRANS + ', background 0.25s';

  // Incoming: grow to center (0,0 = orbit origin = 50%/50% of viewport)
  inEl.style.left   = '0px';
  inEl.style.top    = '0px';
  inEl.style.width  = CENTER_W + 'px';
  inEl.style.height = CENTER_H + 'px';
  inEl.classList.add('is-center');

  // Outgoing: shrink to orbital slot position
  outEl.style.left   = capL + 'px';
  outEl.style.top    = capT + 'px';
  outEl.style.width  = SMALL_W + 'px';
  outEl.style.height = SMALL_H + 'px';
  outEl.classList.remove('is-center');

  setTimeout(() => {
    const prevCenter = centerCard;
    centerCard       = molId;
    orbitCards[slotIdx] = prevCenter;

    // Strip transitions — rAF takes over orbital positions
    inEl.style.transition  = '';
    outEl.style.transition = '';

    setGlow(inEl, molId);
    setGlow(outEl, prevCenter, true);
    swapping = false;
    startMusicOnInteraction();
  }, 600);
}

// ─── RENDER MENU ──────────────────────────────────────────────────────────────
function renderMenu() {
  initOrbit();
  const stage = document.getElementById('orbit-stage');

  // Faint heart trail SVG — centered on orbit origin (0,0)
  (function() {
    let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
    arcTable.pts.forEach(p => {
      if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
    });
    const pad = SMALL_W;
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', `${minX-pad} ${minY-pad} ${maxX-minX+pad*2} ${maxY-minY+pad*2}`);
    svg.style.cssText = `position:absolute;left:${minX-pad}px;top:${minY-pad}px;width:${maxX-minX+pad*2}px;height:${maxY-minY+pad*2}px;pointer-events:none;transform:translate(-0%,-0%);overflow:visible;`;
    let d = '';
    arcTable.pts.forEach((p, i) => {
      d += i === 0 ? `M${p.x.toFixed(1)},${p.y.toFixed(1)}` : `L${p.x.toFixed(1)},${p.y.toFixed(1)}`;
    });
    d += 'Z';
    const trail = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    trail.setAttribute('d', d); trail.setAttribute('fill', 'none');
    trail.setAttribute('stroke', '#F5C842'); trail.setAttribute('stroke-width', '1.5');
    trail.setAttribute('stroke-dasharray', '6 10'); trail.setAttribute('opacity', '0.25');
    svg.appendChild(trail);
    stage.appendChild(svg);
  })();

  // Slot assignment: dopamine = center, rest fill orbit in data order
  centerCard  = 'dopamine';
  orbitCards  = molecules.filter(m => m.id !== 'dopamine').map(m => m.id);

  // Build all 12 cards
  molecules.forEach(mol => {
    const isCenter = mol.id === 'dopamine';
    const el = document.createElement('div');
    el.className = 'mol-card' + (isCenter ? ' is-center' : '');
    el.dataset.id = mol.id;

    const svg = (cardSVGs[mol.id] || (() => ''))(mol.color);

    el.innerHTML = `
      <div class="card-small">
        <div class="c-svg"><svg viewBox="0 0 180 110" xmlns="http://www.w3.org/2000/svg">${svg}</svg></div>
        <div class="c-name">${mol.name}</div>
        <div class="c-formula">${mol.formula}</div>
      </div>
      <div class="card-center">
        <div class="c-svg"><svg viewBox="0 0 180 110" xmlns="http://www.w3.org/2000/svg">${svg}</svg></div>
        <div class="c-name">${mol.name}</div>
        <div class="c-formula">${mol.formula}</div>
        <div class="c-emotion">${mol.emotion}</div>
        <div class="c-open">открыть →</div>
      </div>
    `;

    el.addEventListener('click', () => {
      if (centerCard === mol.id) openSlide(mol.id);
      else swapToCenter(mol.id);
    });

    // Set initial size
    el.style.width  = (isCenter ? CENTER_W : SMALL_W) + 'px';
    el.style.height = (isCenter ? CENTER_H : SMALL_H) + 'px';

    cardEls[mol.id] = el;
    stage.appendChild(el);
  });

  // Set initial positions — center at origin, small cards at orbit coords
  const centerEl = cardEls['dopamine'];
  centerEl.style.left = '0px';
  centerEl.style.top  = '0px';

  orbitCards.forEach((id, i) => {
    const p = getOrbitPos(i);
    cardEls[id].style.left = p.left.toFixed(2) + 'px';
    cardEls[id].style.top  = p.top.toFixed(2)  + 'px';
  });

  setGlow(centerEl, 'dopamine');
  requestAnimationFrame(orbitStep);
}

// ─── OPEN / CLOSE SLIDES ──────────────────────────────────────────────────────
function openSlide(id) {
  const mol = molecules.find(m => m.id === id);
  if (!mol) return;
  document.getElementById('slide-content').innerHTML = `
    <div class="slide-molecule-label">${mol.formula}</div>
    <div class="slide-name">${mol.name}</div>
    <div class="slide-science">${mol.science}</div>
    <div class="slide-svg-wrap">
      <svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" width="400" height="260">
        ${(slideSVGs[mol.id] || (() => ''))(SC)}
      </svg>
    </div>
    <div class="slide-moment">${mol.moment}</div>
    <div class="slide-illustration">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
      </svg>
      иллюстрация скоро появится
    </div>
  `;
  document.getElementById('mol-slide').classList.add('active');
  document.body.style.overflow = 'hidden';
  startMusicOnInteraction();
}
function openBirthday() {
  document.getElementById('birthday-slide').classList.add('active');
  document.body.style.overflow = 'hidden';
  startMusicOnInteraction();
}
function closeSlide() {
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  document.body.style.overflow = '';
}

// ─── MUSIC ───────────────────────────────────────────────────────────────────
let musicStarted = false;
const audio = document.getElementById('bg-music');
audio.volume = 0.35;
audio.play().then(() => { musicStarted = true; document.getElementById('music-btn').classList.add('playing'); }).catch(() => {});
function startMusicOnInteraction() {
  if (musicStarted) return;
  musicStarted = true;
  audio.volume = 0.35;
  audio.play().then(() => document.getElementById('music-btn').classList.add('playing')).catch(() => {});
}
function toggleMusic() {
  if (audio.paused) {
    audio.play().then(() => { document.getElementById('music-btn').classList.add('playing'); musicStarted = true; });
  } else {
    audio.pause();
    document.getElementById('music-btn').classList.remove('playing');
  }
}
document.addEventListener('pointerdown', startMusicOnInteraction, { once: true });
document.getElementById('intro').addEventListener('pointerdown', () => { startMusicOnInteraction(); dismissIntro(); }, { once: true });

// ─── PARTICLES ───────────────────────────────────────────────────────────────
function spawnParticles() {
  const c = document.getElementById('particles');
  const symbols = ['♡', '♡', '♡', '✦', '·', '♡', '✧', '♡'];
  for (let i = 0; i < 35; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const sym = symbols[Math.floor(Math.random() * symbols.length)];
    p.textContent = sym;
    const sz = Math.random() * 10 + 8;
    const col = Math.random() < 0.6 ? '#F5C842' : 'rgba(13,33,55,0.25)';
    p.style.cssText = `left:${Math.random()*100}%;font-size:${sz}px;color:${col};animation-duration:${Math.random()*18+12}s;animation-delay:${Math.random()*18}s;`;
    c.appendChild(p);
  }
}

// ─── INTRO ───────────────────────────────────────────────────────────────────
function buildIntroHeart() {
  const svg = document.getElementById('intro-heart');
  if (!svg || !arcTable) return;

  // Compute bounding box of heart path
  let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
  arcTable.pts.forEach(p => {
    if (p.x < minX) minX=p.x; if (p.x > maxX) maxX=p.x;
    if (p.y < minY) minY=p.y; if (p.y > maxY) maxY=p.y;
  });
  const pad = 40;
  svg.setAttribute('viewBox', `${minX-pad} ${minY-pad} ${maxX-minX+pad*2} ${maxY-minY+pad*2}`);

  // ── SVG filter: glow bloom ──
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  defs.innerHTML = `
    <filter id="heart-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dot-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`;
  svg.appendChild(defs);

  // Build path data using raw coordinates (centered at 0,0)
  let d = '';
  for (let i = 0; i <= ARC_SAMPLES; i++) {
    const p = arcTable.pts[i];
    d += i === 0 ? `M${p.x.toFixed(1)},${p.y.toFixed(1)}` : `L${p.x.toFixed(1)},${p.y.toFixed(1)}`;
  }
  d += 'Z';

  // Soft outer bloom (thick, low opacity)
  const bloom = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  bloom.setAttribute('d', d);
  bloom.setAttribute('fill', 'none');
  bloom.setAttribute('stroke', '#F5C842');
  bloom.setAttribute('stroke-width', '14');
  bloom.setAttribute('stroke-linecap', 'round');
  bloom.setAttribute('opacity', '0.18');
  svg.appendChild(bloom);

  // Main crisp line
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', d);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', '#F5C842');
  path.setAttribute('stroke-width', '5');
  path.setAttribute('stroke-linecap', 'round');
  path.setAttribute('stroke-linejoin', 'round');
  path.setAttribute('filter', 'url(#heart-glow)');
  svg.appendChild(path);

  const len = path.getTotalLength();
  [bloom, path].forEach(el => {
    el.style.strokeDasharray = len;
    el.style.strokeDashoffset = len;
  });

  // Traveling spark at the draw tip
  const spark = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  spark.setAttribute('r', '7');
  spark.setAttribute('fill', '#fff');
  spark.setAttribute('filter', 'url(#dot-glow)');
  spark.setAttribute('opacity', '0');
  svg.appendChild(spark);

  // 11 dots — inner filled + outer ripple ring
  const dots = [], rings = [];
  for (let i = 0; i < N_ORBIT; i++) {
    const rel = posAtFraction(i / N_ORBIT, arcTable);
    const cx = rel.x.toFixed(1);
    const cy = rel.y.toFixed(1);
    const delay = `${2.1 + i * 0.1}s`;

    const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    ring.setAttribute('cx', cx); ring.setAttribute('cy', cy);
    ring.setAttribute('r', '18'); ring.setAttribute('fill', 'none');
    ring.setAttribute('stroke', '#F5C842'); ring.setAttribute('stroke-width', '1.5');
    ring.setAttribute('opacity', '0');
    ring.style.transition = `opacity 0.4s ease ${delay}`;
    svg.appendChild(ring);
    rings.push(ring);

    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
    dot.setAttribute('r', '5'); dot.setAttribute('fill', '#F5C842');
    dot.setAttribute('filter', 'url(#dot-glow)');
    dot.setAttribute('opacity', '0');
    dot.style.transition = `opacity 0.3s ease ${delay}`;
    svg.appendChild(dot);
    dots.push(dot);
  }

  // Animate spark along path during draw
  const DRAW_MS = 2000;
  let sparkStart = null;
  function animateSpark(ts) {
    if (!sparkStart) sparkStart = ts;
    const progress = Math.min((ts - sparkStart) / DRAW_MS, 1);
    const pt = path.getPointAtLength(progress * len);
    spark.setAttribute('cx', pt.x.toFixed(1));
    spark.setAttribute('cy', pt.y.toFixed(1));
    spark.setAttribute('opacity', progress < 0.98 ? '1' : '0');
    if (progress < 1) requestAnimationFrame(animateSpark);
  }

  // Trigger everything
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const trans = `stroke-dashoffset ${DRAW_MS}ms cubic-bezier(0.4,0,0.2,1)`;
    bloom.style.transition = path.style.transition = trans;
    bloom.style.strokeDashoffset = path.style.strokeDashoffset = '0';
    spark.setAttribute('opacity', '1');
    requestAnimationFrame(animateSpark);
    dots.forEach(d => { d.style.opacity = '1'; });
    rings.forEach(r => { r.style.opacity = '0.55'; });
  }));
}

function dismissIntro() {
  const intro = document.getElementById('intro');
  intro.classList.add('hide');
  startMusicOnInteraction();
  setTimeout(() => intro.classList.add('gone'), 1300);
}
function runIntro() {
  buildIntroHeart();
  setTimeout(() => document.getElementById('intro').classList.add('ready'), 1800);
  setTimeout(dismissIntro, 6000);
}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSlide(); });

// ─── INIT ────────────────────────────────────────────────────────────────────
renderMenu();
spawnParticles();
runIntro();
</script>
</body>
</html>
